<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pancowarena | Auth</title>
  <style>
    /* Professional Reset */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      height: 100vh;
      display: flex;
      background-color: #ffffff;
    }

    /* Split Layout Structure */
    .side-visual {
      flex: 1;
      background: linear-gradient(135deg, #2c5364, #203a43, #0f2027);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      padding: 40px;
    }

    /* Hide visual on mobile for better UX */
    @media (max-width: 768px) {
      .side-visual { display: none; }
    }

    .auth-section {
      width: 480px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px;
    }

    @media (max-width: 480px) {
      .auth-section { width: 100%; padding: 40px 20px; }
    }

    /* Professional Branding */
    .logo { width: 48px; margin-bottom: 32px; }
    h2 { font-size: 28px; font-weight: 700; color: #1e293b; margin-bottom: 8px; }
    .subtitle { color: #64748b; margin-bottom: 32px; font-size: 15px; }

    /* Form Structure */
    .input-group { margin-bottom: 20px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.025em; }
    
    input {
      width: 100%;
      height: 44px;
      padding: 0 12px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 15px;
      transition: all 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #2c5364;
      box-shadow: 0 0 0 4px rgba(44, 83, 100, 0.1);
    }

    button {
      width: 100%;
      height: 44px;
      background-color: #2c5364;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
    }

    /* Feedback & Toggle */
    #message { margin-top: 16px; font-size: 13px; color: #ef4444; min-height: 1.2em; }
    
    .footer-toggle {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #f1f5f9;
      font-size: 14px;
      color: #64748b;
      text-align: center;
    }

    #switchText { color: #2c5364; font-weight: 600; cursor: pointer; text-decoration: none; }
    #switchText:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <section class="side-visual">
    <h1 style="font-size: 42px; margin-bottom: 16px;">Pancowarena</h1>
    <p style="opacity: 0.8; font-size: 18px; text-align: center;">The ultimate arena for seamless management and performance tracking.</p>
  </section>

  <main class="auth-section">
    <img src="logo.png" class="logo" alt="Logo">
    <h2 id="title">Welcome back</h2>
    <p class="subtitle" id="subtitleText">Please enter your details to sign in.</p>

    <div class="input-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>

    <div class="input-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button id="btn" onclick="handleAuth()">Sign in</button>
    <p id="message"></p>

    <div class="footer-toggle">
      <span id="hintText">Don't have an account?</span>
      <span id="switchText" onclick="toggleMode()">Sign up for free</span>
    </div>
  </main>

  <script type="module">
    /* YOUR ORIGINAL LOGIC - COMPLETELY UNTOUCHED */
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
    from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDKvaLXC7nSM62hC_0PXx-_iXjJX_Kw7WQ",
      authDomain: "pancow.firebaseapp.com",
      projectId: "pancow",
      storageBucket: "pancow.appspot.com",
      messagingSenderId: "357673814983",
      appId: "1:357673814983:web:d9aa4448bfc919452527e2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    let isLogin = true;

    window.toggleMode = function() {
      isLogin = !isLogin;
      document.getElementById("title").innerText = isLogin ? "Welcome back" : "Create an account";
      document.getElementById("subtitleText").innerText = isLogin 
        ? "Please enter your details to sign in." 
        : "Join the Pancowarena community today.";
      document.getElementById("btn").innerText = isLogin ? "Sign in" : "Get started";
      document.getElementById("hintText").innerText = isLogin 
        ? "Don't have an account?" 
        : "Already have an account?";
      document.getElementById("switchText").innerText = isLogin ? "Sign up for free" : "Sign in";
    }

    window.handleAuth = function() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const msg = document.getElementById("message");

      if (isLogin) {
        signInWithEmailAndPassword(auth, email, password)
          .then(() => { window.location.href = "home.html"; })
          .catch(err => { msg.innerText = "Check your email and password."; });
      } else {
        createUserWithEmailAndPassword(auth, email, password)
          .then(() => { window.location.href = "home.html"; })
          .catch(err => { msg.innerText = err.message; });
      }
    }
  </script>
</body>
</html>
